# 기관 정규화 사전 (예외 케이스만 등재)
#
# 기본 규칙: 정규식 `^(.+?대학교)\b` 으로 첫 '대학교'까지를 부모 기관으로 자동 추출.
#   동국대학교 → 동국대학교
#   동국대학교 인도철학불교학연구소 → 동국대학교
#   동국대학교(경주캠퍼스) 티벳대장경역경원 → 동국대학교
#   서울불교대학원대학교 → 서울불교대학원대학교 (별개 기관, 분리 OK)
#   장경도량고려대장경연구소 → (대학교 없음) → 자체 보존 (고려대학교 아님)
#
# 본 사전은 **정규식이 못 잡는 약칭/예외**만 등재.
# canonical_form = 부모 기관(시각화 디폴트로 표시될 이름)

- canonical_id: dongguk_univ
  canonical_form: 동국대학교
  surface_forms:
    - 동국대 인도철학과
    - 동국대 인도철학과 대학원
  verified: true
  notes: "약칭 '동국대'. '동국대학교 X' 형태는 정규식이 자동 처리됨."

- canonical_id: snu
  canonical_form: 서울대학교
  surface_forms:
    - 서울대 학부대학 연수연구원
  verified: true

# ───────────────────────────────────────────────────────
# 정규식이 false-positive로 묶을 위험이 있는 독립 기관 메모
# (실제 매핑은 없음 — parent_institution()이 그대로 surface 보존)
# ───────────────────────────────────────────────────────
#   장경도량고려대장경연구소  ← '고려대학교'와 무관한 별도 연구소
#   고려대장경연구소           ← 위와 같음
#   서울불교대학원대학교       ← '서울대학교'와 무관 (정규식이 전체를 잡음 OK)
#   한국정신문화연구원         ← 대학교 없음 — 자체 보존
