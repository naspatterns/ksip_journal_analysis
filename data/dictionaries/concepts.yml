# 인도철학 학자/개념/학파/원전 정규화 사전
#
# ── 기본 키 ─────────────────────────────────────────────────
# canonical_id      : 안정 키 (snake_case, ASCII)
# canonical_kr      : 화면 디폴트 표기 (한글)
# canonical_iast    : 산스크리트 IAST 표기 (선택)
# canonical_zh      : 한자 표기 (선택)
# type              : 학자 | 개념 | 학파 | 원전 | 문헌 | 인물
# surface_forms     : 데이터에 등장할 수 있는 모든 변형
# verified          : true=수동 승인, false=후보
# notes             : 메모 (선택)
#
# ── 분류 체계 메타 (evaluation 프로젝트, evaluation/taxonomy/SCHEMA.md 참조) ──
# school            : primary_school 라벨 (yoga/yogacara/madhyamaka/pramana 등)
# era               : 시대 bucket (vedic/upanishadic_sutra/classical/post_classical/late/modern/transversal)
# tradition_language: 사상의 원천 언어 (sanskrit/pali/prakrit/chinese/tibetan/mixed/n/a) — 옛 `source_language` rename (Decision-18, 2026-05-20)
# reception_horizon : 지평 (india/east_asia/tibet/korea/west/mixed)
# century           : 자유텍스트 시대 (옛 `era:` 가 이리로 rename, 예: "7세기")

