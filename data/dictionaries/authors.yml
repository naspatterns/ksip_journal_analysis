# 인도철학 저자 정규화 사전
#
# 본 학술지 게재 저자 + 자주 인용되는 외국 학자 모두 포함.
# 한자 부속(예: "안성두(安性斗)") 패턴은 본 데이터에 없으나, 향후 KCI API 보강 시
# 또는 참고문헌의 인용된 저자에서 등장 가능 — alias로 미리 등록.
#
# 한국 학자의 한자 표기는 일부 추정값. 잘못된 경우 수정 환영.
#
# canonical_form : 한글 표준 표기 (논문 메타데이터의 저자명 기준)
# affiliation : 주요 소속 (참고용)
# surface_forms : 한자 부속, 영문 transliteration 변형 등

